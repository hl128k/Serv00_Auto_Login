name: SSH Connect

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 */7 * *'  # 每天午夜执行，可以根据需要修改 cron 表达式

jobs:
  connect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paramiko
          pip install requests

      - name: Run SSH connection script
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS_JSON }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_HEADERS: ${{ secrets.WEBHOOK_HEADERS }}
          WEBHOOK_DATA: ${{ secrets.WEBHOOK_DATA }}
          WEBHOOK_MESSAGE: ${{ secrets.WEBHOOK_MESSAGE }}
          SEND_TYPE: ${{ secrets.SEND_TYPE }}
        run: python ssh.py
